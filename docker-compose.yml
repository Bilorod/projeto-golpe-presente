version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: Golpe
    ports:
      - "3307:3306"
    networks:
      - rede

  app:
    build: .
    container_name: backend-container
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - rede

networks:
  rede:
